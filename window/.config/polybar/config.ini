[colors]
violet = #EE82EE
night = #111111
pink = #FC89AC
princess = #ff6289
candy = #FF0800
vale = #AB4E52
transparent = #FF00000

[bar/toph]
width = 100%
height = 28pt

border-size = 4pt
border-color = #00000000
radius = 9.0

background = ${colors.night}
foreground = ${colors.violet}

bottom = false

line-size = 6pt

padding-left = 0
padding-right = 1
module-margin = 1

font-0 = ComicShannsMono Nerd Font:size=10;6

modules-left = i3
modules-center = chrome thunar
modules-right = battery pulseaudio memory cpu wlan date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/systray]
type = internal/tray

format-margin = 8pt

tray-spacing = 16pt

[module/chrome]
type = custom/text
content = " ’ē½  "
click-left = google-chrome-unstable &

[module/thunar]
type = custom/text
content = " ’ü╝  "
click-left = thunar &

[module/i3]
type = internal/i3

override-redirect = true
index-sort = true

ws-icon-0 = 1;
ws-icon-1 = 2;
ws-icon-2 = 3;
ws-icon-3 = 4;

label-focused = %name%
label-focused-foreground = ${colors.princess}
label-focused-padding = 1

label-visible = %name%
label-visible-padding = 1

label-unfocused = %name%
label-unfocused-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.candy}
label-urgent-padding = 1

label-separator = |
label-separator-padding = 1
label-separator-foreground = ${colors.vale}

[module/filesystem]
type = internal/fs

interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.transparent}

[module/battery]
type = internal/battery

full-at = 100
format-full = ’ēĆ  <label-full>

format-charging = <animation-charging> <label-charging>
animation-charging-0 = ’ēä
animation-charging-1 = ’ēā
animation-charging-2 = ’ēé
animation-charging-3 = ’ēü
animation-charging-4 = ’ēĆ
animation-charging-framerate = 750
animation-charging-foreground = ${colors.violet}

format-discharging = <ramp-capacity> <label-discharging>
ramp-capacity-0 = ’ēä
ramp-capacity-1 = ’ēā
ramp-capacity-2 = ’ēé
ramp-capacity-3 = ’ēü
ramp-capacity-4 = ’ēĆ

low-at = 5
poll-interval = 5

battery = BAT1
adapter = ACAD

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "’Ć©  " 
format-volume-prefix-foreground = ${colors.vale}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = "’Ć”"
label-muted-foreground = ${colors.candy}

[module/memory]
type = internal/memory

interval = 2

format-prefix = "’ł│  "
format-prefix-foreground = ${colors.vale}

label = %percentage_used:2%%

[module/cpu]
type = internal/cpu

interval = 2

format-prefix = "’ŗø "
format-prefix-foreground = ${colors.vale}

label = %percentage:2%%


[network-base]
type = internal/network

interval = 5

format-connected = <label-connected>
format-disconnected = <label-disconnected>

label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base

interface-type = wireless

label-connected = ’ć½  %essid%

[module/eth]
inherit = network-base

interface-type = wired

label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date

interval = 1
date = %d-%m-%Y
time = %H:%M:%S

format = ’ĆŚ  <label>
label = %time% %date%
label-foreground = ${colors.vale}

[settings]
screenchange-reload = true
pseudo-transparency = true
